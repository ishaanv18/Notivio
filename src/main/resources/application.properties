# ============================================================
# NOTIVIO - Application Configuration
# ============================================================

# ── Application ──────────────────────────────────────────────
spring.application.name=notivio-backend
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ── Server ───────────────────────────────────────────────────
server.port=${SERVER_PORT:8080}
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain
server.compression.min-response-size=1024
server.error.include-message=always
server.error.include-binding-errors=always

# ── Database (PostgreSQL / Supabase) ─────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/notivio}
spring.datasource.username=${DB_USERNAME:notivio_user}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Connection Pool (optimized for Supabase Session Pooler)
spring.datasource.hikari.pool-name=NotivioHikariPool
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.idle-timeout=180000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.keepalive-time=0
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.data-source-properties.socketTimeout=20
spring.datasource.hikari.data-source-properties.tcpKeepAlive=true
# Required for Supabase PgBouncer compatibility (no prepared statements)
spring.datasource.hikari.data-source-properties.prepareThreshold=0
spring.datasource.hikari.data-source-properties.preparedStatementCacheQueries=0

# ── JPA / Hibernate ──────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.jdbc.fetch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.generate_statistics=false
spring.jpa.open-in-view=false

# ── Flyway (DB Migrations) ────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

# ── Google OAuth2 ─────────────────────────────────────────────
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile,https://www.googleapis.com/auth/gmail.readonly,https://www.googleapis.com/auth/gmail.labels,https://www.googleapis.com/auth/calendar,https://www.googleapis.com/auth/calendar.events
spring.security.oauth2.client.registration.google.redirect-uri=${APP_BASE_URL:http://localhost:8080}/login/oauth2/code/google
spring.security.oauth2.client.registration.google.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.google.client-name=Google
# Force refresh_token to be returned by Google (required for long-lived Gmail access)
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth?access_type=offline&prompt=consent
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=sub

# ── Mail / SMTP ───────────────────────────────────────────────
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ── Async Thread Pool ─────────────────────────────────────────
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=16
spring.task.execution.pool.queue-capacity=100
spring.task.execution.pool.keep-alive=60s
spring.task.execution.thread-name-prefix=notivio-async-
spring.task.scheduling.pool.size=4

# ── Spring Management / Actuator ──────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ── JWT ───────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:defaultSecretKeyMustBeChangedInProductionMinimum256Bits1234}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

# ── Token Encryption (AES-256) ────────────────────────────────
encryption.key=${ENCRYPTION_KEY:defaultEncryptionKey1234}

# ── AI - Groq (Primary) ───────────────────────────────────────
ai.groq.api-key=${GROQ_API_KEY:}
ai.groq.base-url=${GROQ_BASE_URL:https://api.groq.com/openai/v1}
ai.groq.model=${GROQ_MODEL:llama3-8b-8192}
ai.groq.max-tokens=1024
ai.groq.temperature=0.1
ai.groq.timeout-seconds=30

# ── AI - OpenRouter (Fallback) ────────────────────────────────
ai.openrouter.api-key=${OPENROUTER_API_KEY:}
ai.openrouter.base-url=${OPENROUTER_BASE_URL:https://openrouter.ai/api/v1}
ai.openrouter.model=${OPENROUTER_MODEL:meta-llama/llama-3-8b-instruct:free}
ai.openrouter.max-tokens=1024
ai.openrouter.temperature=0.1
ai.openrouter.timeout-seconds=45

# ── Gmail ─────────────────────────────────────────────────────
gmail.sync-interval-minutes=${GMAIL_SYNC_INTERVAL_MINUTES:15}
gmail.max-emails-per-sync=${GMAIL_MAX_EMAILS_PER_SYNC:50}

# ── Firebase / FCM ────────────────────────────────────────────
firebase.service-account-path=${FIREBASE_SERVICE_ACCOUNT_PATH:}
firebase.service-account-base64=${FIREBASE_SERVICE_ACCOUNT_BASE64:}

# ── Notifications ─────────────────────────────────────────────
notification.admin-email=${ADMIN_EMAIL:admin@notivio.com}
notification.expo.base-url=https://exp.host/--/api/v2/push/send

# ── Rate Limiting ─────────────────────────────────────────────
rate-limit.requests-per-minute=${RATE_LIMIT_REQUESTS_PER_MINUTE:60}
rate-limit.burst=${RATE_LIMIT_BURST:10}

# ── Scheduler ─────────────────────────────────────────────────
scheduler.reminder-check-interval-seconds=${REMINDER_CHECK_INTERVAL_SECONDS:60}
scheduler.task-status-update-interval-hours=${TASK_STATUS_UPDATE_INTERVAL_HOURS:1}
scheduler.keepalive-url=${KEEPALIVE_URL:http://localhost:8080/health}
scheduler.keepalive-interval-minutes=${KEEPALIVE_INTERVAL_MINUTES:5}

# ── App Base URL ─────────────────────────────────────────────
app.base-url=${APP_BASE_URL:http://localhost:8080}
app.frontend-url=${FRONTEND_URL:http://localhost:3000}

# ── SpringDoc / Swagger ───────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.display-request-duration=true
springdoc.show-actuator=false

# ── Logging ───────────────────────────────────────────────────
logging.level.root=INFO
logging.level.com.notivio=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/notivio.log

# ── Resilience4j Circuit Breaker ──────────────────────────────
resilience4j.circuitbreaker.instances.groq.sliding-window-size=10
resilience4j.circuitbreaker.instances.groq.failure-rate-threshold=80
resilience4j.circuitbreaker.instances.groq.wait-duration-in-open-state=15s
resilience4j.circuitbreaker.instances.groq.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.groq.automatic-transition-from-open-to-half-open-enabled=true

resilience4j.circuitbreaker.instances.openrouter.sliding-window-size=10
resilience4j.circuitbreaker.instances.openrouter.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.openrouter.wait-duration-in-open-state=60s
resilience4j.circuitbreaker.instances.openrouter.permitted-number-of-calls-in-half-open-state=3

resilience4j.retry.instances.groq.max-attempts=2
resilience4j.retry.instances.groq.wait-duration=5s
resilience4j.retry.instances.groq.retry-exceptions=java.io.IOException,java.util.concurrent.TimeoutException

resilience4j.retry.instances.gmail.max-attempts=3
resilience4j.retry.instances.gmail.wait-duration=5s
