# ============================================================
# NOTIVIO - Docker Compose (Development + Production)
# ============================================================

version: '3.8'

services:
  # ── PostgreSQL Database ─────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: notivio-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: notivio
      POSTGRES_USER: ${DB_USERNAME:-notivio_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-notivio_pass}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-notivio_user} -d notivio"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - notivio-network

  # ── Spring Boot Application ─────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: notivio-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      # Database
      DB_URL: jdbc:postgresql://db:5432/notivio
      DB_USERNAME: ${DB_USERNAME:-notivio_user}
      DB_PASSWORD: ${DB_PASSWORD:-notivio_pass}
      # Google OAuth2
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      # JWT & Encryption
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      # AI APIs
      GROQ_API_KEY: ${GROQ_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      # Firebase
      FIREBASE_SERVICE_ACCOUNT_BASE64: ${FIREBASE_SERVICE_ACCOUNT_BASE64}
      # App
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8080}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      # JVM
      JAVA_OPTS: "-Xms256m -Xmx512m -XX:+UseG1GC"
    volumes:
      - app_logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - notivio-network

volumes:
  postgres_data:
    driver: local
  app_logs:
    driver: local

networks:
  notivio-network:
    driver: bridge
